<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: white;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #00ED64;
      color: #071018;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #00c955;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h3 style="margin-top: 0;">Add to Job Tracker</h3>
  
  <label style="font-size: 12px; color: #cbd5e1;">Company Name</label>
  <input type="text" id="company" placeholder="e.g. Google">
  
  <label style="font-size: 12px; color: #cbd5e1;">Role Title</label>
  <input type="text" id="role" placeholder="e.g. Frontend Developer">
  
  <button id="addBtn">Save to Dashboard</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
